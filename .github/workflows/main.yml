name: "tagged-release"

on:
  push:
    tags:
      - "v*"

jobs:
  tagged-release:
    name: "Tagged Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: deno run --allow-env --allow-read --allow-write --allow-net build.ts production

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: |
            main.js
            manifest.json
            styles.css
